name: Release SLSA Provenance

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      subjects: ${{ steps.subjects.outputs.base64_subjects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app assets
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Locate installer
        id: detect
        shell: pwsh
        run: |
          $asset = Get-ChildItem release -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $asset) {
            throw "Installer not found in release/."
          }
          "asset_path=$($asset.FullName)" >> $env:GITHUB_OUTPUT

      - name: Generate hash file
        shell: bash
        run: |
          sha256sum "${{ steps.detect.outputs.asset_path }}" > subjects.txt

      - name: Generate SLSA subjects
        id: subjects
        uses: slsa-framework/slsa-github-generator/actions/generator/generic/create-base64-subjects-from-file@v2.1.0
        with:
          path: subjects.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: ${{ steps.detect.outputs.asset_path }}
          if-no-files-found: error

      - name: Upload subjects artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer-subjects
          path: subjects.txt
          if-no-files-found: error

  provenance:
    name: Generate SLSA provenance
    needs:
      - build-windows-installer
    permissions:
      actions: read
      id-token: write
      contents: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build-windows-installer.outputs.subjects }}
      provenance-name: financial-windows.intoto.jsonl
